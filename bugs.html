<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Bugs</title>
<script src="helpers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels/dist/chartjs-plugin-datalabels.min.js"></script>

<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
  }

  .platform-buttons {
    display: flex;
    gap: 50px;
    margin-bottom: 50px;
  }

  .platform-buttons button {
    padding: 15px 30px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background-color: #808080;
    color: white;
    font-size: 18px;
    transition: background-color 0.3s;
  }

  .platform-buttons button:hover {
    background-color: #505050;
  }

  .row {
    width: 80%;
    margin-bottom: 30px;
  }

  .row-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
    border-bottom: 3px double #000;
    padding-bottom: 5px;
    text-align: left;
  }

  .stats-row {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align: center;
    width: 300px;
  }

  .content-row {
    display: flex;
    justify-content: space-between;
    gap: 20px;
  }

  .number-column {
    width: 30%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    background-color: #e0e0e0;
    border-radius: 10px;
    padding: 20px;
  }

  .canvas-column canvas {
    width: 100%;
    height: 450px;
    background-color: white;
    border-radius: 10px;
  }

  .sub-row {
    flex: 1;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background-color: #ffffff;
    border: 1px solid #ddd;
    border-radius: 10px;
  }

  th, td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #ddd;
    font-size: 14px;
    word-wrap: break-word;
  }

  th {
    background-color: #f2f2f2;
  }

  .bug-table-container {
    width: 80%;
    margin-bottom: 30px;
  }
</style>
  <script>
    function displayBugTable(bugs, tableBody) {
      bugs.forEach(bug => {
        const row = document.createElement('tr');
        const lastUpdate = (new Date(bug.last_change_time)).toISOString().split('T')[0];
        const creationDate = (new Date(bug.creation_time)).toISOString().split('T')[0];
        row.innerHTML = `
          <td><a href="https://bugzilla.mozilla.org/show_bug.cgi?id=${bug.id}">${bug.id}</a></td>
          <td>${bug.status}</td>
          <td>${bug.component}</td>
          <td>${bug.summary}</td>
          <td>${lastUpdate}</td>
          <td>${creationDate}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    function displayRegressionTable() {
      const regressionTableBody = document.querySelector('#regression-table tbody');
      const regressions = window.openBugs.filter(bug => bug.keywords.includes('regression'));
      displayBugTable(regressions, regressionTableBody);
    }

    function displayBugTables() {
      displayRegressionTable();
    }

    const backgroundColorPlugin = {
      id: 'backgroundColor',
      beforeDraw: (chart) => {
        const {ctx, width, height} = chart;
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0, 0, width, height);
      }
    };

    function displayOSChart() {
      const os_counts = window.openBugs.reduce((acc, bug) => {
        acc[bug.op_sys] = (acc[bug.op_sys] || 0) + 1;
        return acc;
      }, {});

      const labels = Object.keys(os_counts).map(key => `${key} (${os_counts[key]})`);
      const data = Object.values(os_counts);

      const ctx = document.getElementById('os-canvas').getContext('2d');
      const osChart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            data: data
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'right',
              labels: {
                boxWidth: 20,
                maxWidth: 300,
                font: {
                  size: 12
                }
              }
            }
          }
        },
        plugins: [backgroundColorPlugin]
      });
      
    }

    function displayComponentChart() {
      const componentCounts = window.openBugs.reduce((acc, bug) => {
        acc[bug.component] = (acc[bug.component] || 0) + 1;
        return acc;
      }, {});

      const labels = Object.keys(componentCounts).map(key => `${key} (${componentCounts[key]})`);
      const data = Object.values(componentCounts);

      const ctx = document.getElementById('component-canvas').getContext('2d');
      const myPieChart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            data: data,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'right',
              labels: {
                boxWidth: 20,
                maxWidth: 300,
                font: {
                  size: 12
                }
              }
            }
          }
        },
        plugins: [backgroundColorPlugin]
      });
      
    }

    function displayImpactChart() {
      const highImpactLength = window.highImpact.filter(bug => bug.status !== 'RESOLVED').length;
      const medImpactLength = window.medImpact.filter(bug => bug.status !== 'RESOLVED').length;
      const lowImpactLength = window.lowImpact.filter(bug => bug.status !== 'RESOLVED').length;
      const untriagedLength = window.untriaged.filter(bug => bug.status !== 'RESOLVED').length;
      const needinfoLength = window.needinfo.filter(bug => bug.status !== 'RESOLVED').length;

      const labels = [
            `High Impact (${highImpactLength})`,
            `Medium Impact (${medImpactLength})`,
            `Low Impact (${lowImpactLength})`,
            `Untriaged (${untriagedLength})`,
            `Pending Needinfo (${needinfoLength})`,
      ];

      const ctx = document.getElementById('impact-canvas').getContext('2d');
      const impactChart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            data: [highImpactLength, medImpactLength, lowImpactLength, untriagedLength, needinfoLength],
            backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#4D5360'],
            hoverBackgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#4D5360']
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'right'
            }
          }
        },
        plugins: [backgroundColorPlugin]
      });
    }

    function displayStatsChart() {
      let startDate = '2024-01-01';
      const recentBugs = window.openBugs.filter(bug => new Date(bug.last_change_time) > new Date(startDate));
      const fixedBugs = window.closedBugs.filter(bug.resolution === 'FIXED').length;

      const regressions = recentBugs.filter(bug => bug.keywords.includes('regression')).length;
      const newBugs = recentBugs.filter(bug => new Date(bug.creation_time) > new Date(startDate)).length;

      const labels = ['Regressions', 'New Bugs', 'Fixed Bugs'];
      const data = [regressions, newBugs, fixedBugs];

      const ctx = document.getElementById('stats-canvas').getContext('2d');
      const myHistogram = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Bug Counts',
            data: data,
            backgroundColor: [
              '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0'
            ],
            borderColor: [
              '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0'
            ],
            borderWidth: 1
          }]
        },
        options: {
          indexAxis: 'y',
          scales: {
            x: {
              beginAtZero: true
            }
          }
        },
        plugins: [backgroundColorPlugin]
      });

    }

    function displayPerfKeywordsChart() {
        const perfKeywords = {
          'responsiveness': 'perf:responsiveness',
          'animation': 'perf:animation',
          'resource-use': ['perf:resource', 'perf:resources', 'perf:resource-use', 'perf:memory'],
          'pageload': 'perf:pageload',
          'startup': 'perf:startup'
        };

        const perfCounts = window.openBugs.reduce((acc, bug) => {
          bug.keywords.forEach(keyword => {
            if (keyword.startsWith('perf:')) {
              let found = false;
              Object.keys(perfKeywords).forEach(key => {
                if (Array.isArray(perfKeywords[key])) {
                  if (perfKeywords[key].includes(keyword)) {
                    acc[key] = (acc[key] || 0) + 1;
                    found = true;
                  }
                } else {
                  if (keyword === perfKeywords[key]) {
                    acc[key] = (acc[key] || 0) + 1;
                    found = true;
                  }
                }
              });
              if (!found) {
                acc['Unspecified'] = (acc['Unspecified'] || 0) + 1;
              }
            }
          });
          return acc;
        }, {});

        const labels = Object.keys(perfCounts).map(key => `${key} (${perfCounts[key]})`);
        const data = Object.values(perfCounts);

        const ctx = document.getElementById('keyword-canvas').getContext('2d');
        const perfKeywordChart = new Chart(ctx, {
          type: 'pie',
          data: {
            labels: labels,
            datasets: [{
              data: data,
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                position: 'right'
              }
            }
          },
          plugins: [backgroundColorPlugin]
        });
    }

    function loadBugzillaData() {
      const bugzillaUrl = 'https://raw.githubusercontent.com/dpalmeiro/mozilla-perf-bugdata/main/bugzilla-data-all.json';

      fetch(bugzillaUrl)
        .then(response => response.json())
        .then(data => {
          console.log(data);

          // bugzilla sorts from oldest->newest, so reverse the arrays.
          window.highImpact = data.high.bugs.reverse();
          window.medImpact = data.medium.bugs.reverse();
          window.lowImpact = data.low.bugs.reverse();
          window.untriaged = data.untriaged.bugs.reverse();
          window.needinfo = data.needinfo.bugs.reverse();
          let allBugs = [...window.highImpact, ...window.medImpact, ...window.lowImpact, ...window.untriaged, ...window.needinfo];
          allBugs.sort((a, b) => (new Date(b.last_change_time)) - (new Date(a.last_change_time)));

          window.openBugs = allBugs.filter(bug => bug.status !== 'RESOLVED');
          window.closedBugs = allBugs.filter(bug => bug.status === 'RESOLVED');

          displayPerfKeywordsChart();
          displayImpactChart();
          displayComponentChart();
          displayOSChart();

          displayBugTables();
        })
        .catch(error => console.error('Error fetching Bugzilla data:', error));
    }

    function generateContent() {
      loadBugzillaData();
    }

    document.addEventListener("DOMContentLoaded", generateContent);
  </script>

</head>
<body>
  <div class="row">
    <div class="content-row">
      <div class="sub-row">
        <div class="row-title">Performance Type Distribution</div>
        <div class="content-row">
          <div class="canvas-column">
            <canvas id="keyword-canvas"></canvas>
          </div>
        </div>
      </div>
      <div class="sub-row">
        <div class="row-title">Performance Impact Distribution</div>
        <div class="content-row">
          <div class="canvas-column">
            <canvas id="impact-canvas"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="content-row">
      <div class="sub-row">
        <div class="row-title">OS Distribution</div>
        <div class="content-row">
          <div class="canvas-column">
            <canvas id="os-canvas"></canvas>
          </div>
        </div>
      </div>
      <div class="sub-row">
        <div class="row-title">Component Distribution</div>
        <div class="content-row">
          <div class="canvas-column">
            <canvas id="component-canvas"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bug-table-container">
    <div class="row-title" style="text-align: center">Open Regressions</div>
    <table id="regression-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Status</th>
          <th>Component</th>
          <th>Summary</th>
          <th>Last Update</th>
          <th>Creation Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</body>
</html>
